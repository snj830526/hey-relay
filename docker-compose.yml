version: '3.8'

services:
  app:
    image: ghcr.io/snj830526/hey-relay:latest
    container_name: hey-relay-app
    ports:
      - "8088:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    container_name: hey-relay-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data: